<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos — E-commerce</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- CSS Global -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <i class="bi bi-shop me-2"></i>E-commerce
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">
                        <i class="bi bi-house-door me-1"></i>Início
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="produtos.html">
                        <i class="bi bi-box-seam me-1"></i>Produtos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="pedidos.html">
                        <i class="bi bi-receipt me-1"></i>Pedidos
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Conteúdo principal -->
<main class="container py-4">

    <h1 class="fw-bold mb-4">Gerenciamento de Pedidos</h1>

    <!-- Formulário de novo pedido -->
    <div class="form-section" id="form-section">
        <h5><i class="bi bi-plus-circle me-2"></i>Novo Pedido</h5>
        <form id="form-pedido">
            <div class="row g-3">
                <div class="col-md-4">
                    <label for="nomeCliente" class="form-label">Nome do Cliente</label>
                    <input type="text" class="form-control" id="nomeCliente" placeholder="Digite o nome" required>
                </div>
                <div class="col-md-4">
                    <label for="idProduto" class="form-label">Produto</label>
                    <select class="form-select" id="idProduto" required>
                        <option value="">Selecione um produto...</option>
                        <!-- preenchido via JavaScript -->
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="quantidade" class="form-label">Quantidade</label>
                    <input type="number" class="form-control" id="quantidade" min="1" value="1" required>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-check-lg me-1"></i>Criar
                    </button>
                </div>
            </div>
        </form>
    </div>

    <!-- Listagem de pedidos -->
    <div class="content-section" id="list-section">
        <h5 class="fw-bold mb-3"><i class="bi bi-list-ul me-2"></i>Pedidos Realizados</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="tabela-pedidos">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Produto</th>
                    <th>Qtd</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th class="text-center">Ações</th>
                </tr>
                </thead>
                <tbody id="tbody-pedidos">
                <!-- preenchido via JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

</main>

<!-- Footer -->
<footer class="text-center py-3 mt-4">
    <p class="mb-0">E-commerce API &copy; 2026 — Projeto Final Web I</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Modal para editar status -->
<div class="modal fade" id="modalStatus" tabindex="-1" aria-labelledby="modalStatusLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalStatusLabel">Alterar Status</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <select class="form-select" id="selectNovoStatus">
                    <option value="PENDENTE">Pendente</option>
                    <option value="CONFIRMADO">Confirmado</option>
                    <option value="CANCELADO">Cancelado</option>
                </select>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary btn-sm" id="btnSalvarStatus">Salvar</button>
            </div>
        </div>
    </div>
</div>

<script src="js/pedidos.js"></script>

</body>
</html>
