<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - E-commerce</title>
</head>
<body>

<h1>Gerenciamento de Pedidos</h1>

<!-- SEÇÃO 1: Formulário de criar pedido -->
<section id="form-section">
    <h2>Novo Pedido</h2>
    <form id="form-pedido">
        <div>
            <label for="nomeCliente">Nome do Cliente:</label>
            <input type="text" id="nomeCliente" placeholder="Digite o nome" required>
        </div>

        <div>
            <label for="idProduto">Produto:</label>
            <select id="idProduto" required>
                <option value="">Selecione um produto...</option>
                <!-- preenchido via JavaScript -->
            </select>
        </div>

        <div>
            <label for="quantidade">Quantidade:</label>
            <input type="number" id="quantidade" min="1" required>
        </div>

        <button type="submit">Criar Pedido</button>
    </form>
</section>

<!-- SEÇÃO 2: Listagem de pedidos -->
<section id="list-section">
    <h2>Pedidos Realizados</h2>
    <table id="tabela-pedidos">
        <thead>
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Produto</th>
            <th>Quantidade</th>
            <th>Total</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody id="tbody-pedidos">
        <!-- preenchido via JavaScript -->
        </tbody>
    </table>
</section>

<script src="js/pedidos.js"></script>
</body>
</html>
